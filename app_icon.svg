<svg width="140" height="140" viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- background -->
  <rect width="140" height="140" fill="url(#bg)"/>

  <!-- ground shadow -->
  <ellipse cx="70" cy="118" rx="38" ry="8" fill="black" opacity="0.18"/>

  <!-- terminal window -->
  <g>
    <!-- window body -->
    <rect x="28" y="30" width="84" height="82" rx="8" fill="url(#fg)"/>

    <!-- window inner background -->
    <rect x="32" y="46" width="76" height="62" rx="4" fill="url(#bg)" opacity="0.85"/>

    <!-- title bar dots -->
    <circle cx="40" cy="38" r="3" fill="white" opacity="0.35"/>
    <circle cx="50" cy="38" r="3" fill="white" opacity="0.35"/>
    <circle cx="60" cy="38" r="3" fill="white" opacity="0.35"/>

    <!-- prompt chevron > -->
    <path d="M42 62L52 70L42 78" stroke="url(#fg)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- cursor line -->
    <line x1="58" y1="70" x2="80" y2="70" stroke="white" stroke-opacity="0.72" stroke-width="3" stroke-linecap="round"/>

    <!-- code line 1 -->
    <line x1="42" y1="88" x2="68" y2="88" stroke="white" stroke-opacity="0.30" stroke-width="2.5" stroke-linecap="round"/>

    <!-- code line 2 -->
    <line x1="42" y1="96" x2="58" y2="96" stroke="white" stroke-opacity="0.20" stroke-width="2.5" stroke-linecap="round"/>

    <!-- AI sparkle -->
    <g transform="translate(88, 56)">
      <path d="M0 -8L2 -2L8 0L2 2L0 8L-2 2L-8 0L-2 -2Z" fill="white" opacity="0.85"/>
    </g>
    <g transform="translate(78, 96)">
      <path d="M0 -5L1.2 -1.2L5 0L1.2 1.2L0 5L-1.2 1.2L-5 0L-1.2 -1.2Z" fill="white" opacity="0.55"/>
    </g>

    <!-- window highlight -->
    <path d="M36 30C36 30 32 34 32 38V44H108V38C108 33.6 104.4 30 100 30H36Z"
          fill="white" opacity="0.14"/>
  </g>

  <defs>
    <linearGradient id="bg" x1="70" y1="-60" x2="70" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6532C7"/>
      <stop offset="1" stop-color="#603B99"/>
    </linearGradient>

    <linearGradient id="fg" x1="28" y1="28" x2="112" y2="114" gradientUnits="userSpaceOnUse">
      <stop stop-color="white"/>
      <stop offset="1" stop-color="#D8F9FD"/>
      <stop offset="1.0001" stop-color="#B8ECFF"/>
    </linearGradient>
  </defs>
</svg>
